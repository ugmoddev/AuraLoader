<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - AuraHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="/public/img/logo.png" alt="AuraHub">
            <h3>AuraHub</h3>
        </div>
        <ul class="sidebar-nav">
            <li><a href="/"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a href="/scripts"><i class="fas fa-code"></i> Scripts</a></li>
            <li><a href="/loaders"><i class="fas fa-link"></i> Loaders</a></li>
            <li><a href="/users" class="active"><i class="fas fa-users"></i> Users</a></li>
            <li><a href="/logs"><i class="fas fa-history"></i> Logs</a></li>
            <li><a href="/admin"><i class="fas fa-cog"></i> Admin</a></li>
            <li><a href="/settings"><i class="fas fa-sliders-h"></i> Settings</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-search">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search users...">
            </div>
            <div class="topbar-actions">
                <button class="btn-icon"><i class="fas fa-bell"></i></button>
                <button class="btn-icon sidebar-toggle"><i class="fas fa-bars"></i></button>
                <div class="topbar-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6c5ce7&color=fff" alt="Profile">
                    <div>
                        <div class="username">Admin</div>
                        <div class="role">Administrator</div>
                    </div>
                </div>
            </div>
        </header>

        <section>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div>
                    <h1>Users</h1>
                    <p class="text-secondary">Manage platform users</p>
                </div>
                <button class="btn-primary-glass">
                    <i class="fas fa-user-plus"></i> Add User
                </button>
            </div>

            <div class="glass-card">
                <div class="table-container">
                    <table class="table-glass">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th>Last Login</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersList">
                            <!-- Dynamic content -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        async function loadUsers() {
            try {
                const token = localStorage.getItem('aurahub_token');
                const response = await fetch('/api/users', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await response.json();
                
                if (data.success) {
                    renderUsers(data.data);
                }
            } catch (error) {
                console.error('Failed to load users:', error);
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersList');
            tbody.innerHTML = '';
            
            users.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${user.username}</strong></td>
                    <td>${user.email || 'N/A'}</td>
                    <td><span class="badge-status ${user.role === 'admin' ? 'active' : user.role === 'moderator' ? 'pending' : ''}">${user.role}</span></td>
                    <td><span class="badge-status ${user.status === 'active' ? 'active' : 'inactive'}">${user.status}</span></td>
                    <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                    <td>${user.lastLogin ? new Date(user.lastLogin).toLocaleString() : 'Never'}</td>
                    <td>
                        <button class="btn-glass" style="padding: 4px 8px;"><i class="fas fa-edit"></i></button>
                        <button class="btn-glass" style="padding: 4px 8px; color: var(--danger);"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        loadUsers();
    </script>
</body>
</html>
