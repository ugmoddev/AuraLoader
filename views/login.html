<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AuraHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/public/css/style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .login-box {
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }
        .login-box h1 {
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
        }
        .login-box .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 14px;
        }
        .login-box .form-group {
            margin-bottom: 16px;
        }
        .login-box label {
            display: block;
            margin-bottom: 4px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }
        .login-box input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        .login-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }
        .login-box .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 4px;
        }
        .login-box .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.4);
        }
        .login-box .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .login-box .register-link {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .login-box .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .login-box .register-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: var(--danger);
            text-align: center;
            margin-bottom: 16px;
            display: none;
            padding: 10px;
            background: rgba(225, 112, 85, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(225, 112, 85, 0.2);
        }
        .success-message {
            color: var(--secondary);
            text-align: center;
            margin-bottom: 16px;
            display: none;
            padding: 10px;
            background: rgba(0, 184, 148, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(0, 184, 148, 0.2);
        }
        .login-box .icon-input {
            position: relative;
        }
        .login-box .icon-input i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            opacity: 0.5;
        }
        .login-box .icon-input input {
            padding-left: 40px;
        }
        @media (max-width: 480px) {
            .login-box {
                padding: 24px;
            }
            .login-box h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box glass-card">
            <h1>AuraHub</h1>
            <p class="subtitle">Welcome back! Login to your account</p>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="icon-input">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="icon-input">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="register-link">
                Don't have an account? <a href="/register">Register here</a>
            </div>
        </div>
    </div>

    <script>
        // KHÔNG TỰ ĐỘNG REDIRECT Ở ĐÂY
        // Để server (middleware) xử lý việc redirect

        console.log('📄 Login page loaded');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');
            const submitBtn = document.getElementById('loginBtn');
            
            // Reset messages
            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            
            // Validate
            if (!username || !password) {
                errorEl.textContent = 'Please enter username and password';
                errorEl.style.display = 'block';
                return;
            }
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            try {
                console.log('🔐 Attempting login for:', username);
                
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                console.log('📥 Login response:', data);
                
                if (data.success) {
                    // Lưu token
                    localStorage.setItem('aurahub_token', data.data.token);
                    console.log('✅ Token saved');
                    
                    // Hiển thị success message
                    successEl.textContent = '✅ Login successful! Redirecting...';
                    successEl.style.display = 'block';
                    
                    // Redirect bằng JavaScript
                    setTimeout(() => {
                        console.log('🚀 Redirecting to dashboard...');
                        window.location.href = '/';
                    }, 500);
                } else {
                    errorEl.textContent = data.error || 'Login failed';
                    errorEl.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            } catch (error) {
                console.error('❌ Login error:', error);
                errorEl.textContent = 'Network error. Please check your connection.';
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });
        
        // Enter key support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const form = document.getElementById('loginForm');
                if (document.activeElement === document.getElementById('username') || 
                    document.activeElement === document.getElementById('password')) {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });
    </script>
</body>
</html>
