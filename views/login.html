<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AuraHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/public/css/style.css">
    <style>
        /* ... styles giữ nguyên ... */
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box glass-card">
            <h1>AuraHub</h1>
            <p class="subtitle">Welcome back! Login to your account</p>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="icon-input">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="icon-input">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="register-link">
                Don't have an account? <a href="/register">Register here</a>
            </div>
        </div>
    </div>

    <script>
        console.log('📄 Login page loaded');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');
            const submitBtn = document.getElementById('loginBtn');
            
            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            
            if (!username || !password) {
                errorEl.textContent = 'Please enter username and password';
                errorEl.style.display = 'block';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            try {
                console.log('🔐 Attempting login for:', username);
                
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                console.log('📥 Login response:', data);
                
                if (data.success) {
                    // Lưu token
                    localStorage.setItem('aurahub_token', data.data.token);
                    console.log('✅ Token saved');
                    
                    // =============================================
                    // QUAN TRỌNG: Redirect theo URL từ server
                    // =============================================
                    const redirectUrl = data.redirect || '/';
                    console.log('🚀 Redirecting to:', redirectUrl);
                    
                    successEl.textContent = '✅ Login successful! Redirecting...';
                    successEl.style.display = 'block';
                    
                    // Force redirect
                    setTimeout(function() {
                        window.location.href = redirectUrl;
                    }, 300);
                    
                } else {
                    errorEl.textContent = data.error || 'Login failed';
                    errorEl.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            } catch (error) {
                console.error('❌ Login error:', error);
                errorEl.textContent = 'Network error: ' + error.message;
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });
        
        // Enter key support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const form = document.getElementById('loginForm');
                if (document.activeElement === document.getElementById('username') || 
                    document.activeElement === document.getElementById('password')) {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });
    </script>
</body>
</html>
