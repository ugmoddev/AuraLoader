<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AuraHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/public/css/style.css">
    <style>
        /* ... giữ nguyên styles ... */
        .debug-info {
            margin-top: 16px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            display: none;
            word-break: break-all;
        }
        .debug-info.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box glass-card">
            <h1>AuraHub</h1>
            <p class="subtitle">Welcome back! Login to your account</p>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <!-- ============================================= -->
            <!-- CÁCH 1: Dùng FORM ACTION (Không dùng fetch)  -->
            <!-- ============================================= -->
            <form id="loginForm" action="/auth/login" method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <div class="icon-input">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="icon-input">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="register-link">
                Don't have an account? <a href="/register">Register here</a>
            </div>
            
            <!-- Debug Info -->
            <div id="debugInfo" class="debug-info"></div>
        </div>
    </div>

    <script>
        console.log('📄 Login page loaded');
        
        // =============================================
        // CÁCH 1: FORM ACTION - Không dùng fetch
        // =============================================
        // Form sẽ submit trực tiếp đến /auth/login
        // Server sẽ redirect về / nếu thành công
        
        // =============================================
        // CÁCH 2: Dùng fetch (nếu form action không hoạt động)
        // =============================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            // Bỏ comment dòng dưới nếu muốn dùng fetch thay vì form action
            // e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');
            const debugEl = document.getElementById('debugInfo');
            const submitBtn = document.getElementById('loginBtn');
            
            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            debugEl.classList.remove('show');
            
            if (!username || !password) {
                errorEl.textContent = 'Please enter username and password';
                errorEl.style.display = 'block';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            try {
                console.log('🔐 Attempting login for:', username);
                debugEl.textContent = `⏳ Sending request to /auth/login...`;
                debugEl.classList.add('show');
                
                // Kiểm tra kết nối mạng trước
                const online = navigator.onLine;
                console.log(`📶 Network status: ${online ? 'Online' : 'Offline'}`);
                debugEl.textContent += `\n📶 Network: ${online ? 'Online' : 'Offline'}`;
                
                if (!online) {
                    throw new Error('No internet connection');
                }
                
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                debugEl.textContent += `\n📥 Response status: ${response.status} ${response.statusText}`;
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('📥 Login response:', data);
                debugEl.textContent += `\n📦 Response data: ${JSON.stringify(data, null, 2)}`;
                
                if (data.success) {
                    // Lưu token
                    localStorage.setItem('aurahub_token', data.data.token);
                    console.log('✅ Token saved');
                    
                    successEl.textContent = '✅ Login successful! Redirecting...';
                    successEl.style.display = 'block';
                    
                    debugEl.textContent += `\n🚀 Redirecting to: ${data.redirect || '/'}`;
                    debugEl.classList.add('show');
                    
                    // Redirect
                    setTimeout(() => {
                        window.location.href = data.redirect || '/';
                    }, 500);
                    
                } else {
                    errorEl.textContent = data.error || 'Login failed';
                    errorEl.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            } catch (error) {
                console.error('❌ Login error:', error);
                debugEl.textContent += `\n❌ Error: ${error.message}`;
                debugEl.classList.add('show');
                
                errorEl.textContent = `Network error: ${error.message}`;
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });
    </script>
</body>
</html>
