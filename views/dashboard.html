<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AuraHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/public/css/style.css">
    <script>
        // Check authentication
        (function() {
            const token = localStorage.getItem('aurahub_token');
            if (!token) {
                console.log('❌ No token found, redirecting to login...');
                window.location.href = '/login';
                return;
            }
            console.log('✅ Dashboard loaded with token');
        })();
        
        // Logout function
        function logout() {
            localStorage.removeItem('aurahub_token');
            window.location.href = '/login';
        }
    </script>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h3>AuraHub</h3>
        </div>
        <ul class="sidebar-nav">
            <li><a href="/" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a href="/scripts"><i class="fas fa-code"></i> Scripts</a></li>
            <li><a href="/loaders"><i class="fas fa-link"></i> Loaders</a></li>
            <li><a href="/users"><i class="fas fa-users"></i> Users</a></li>
            <li><a href="/logs"><i class="fas fa-history"></i> Logs</a></li>
            <li><a href="/admin"><i class="fas fa-cog"></i> Admin</a></li>
            <li><a href="/settings"><i class="fas fa-sliders-h"></i> Settings</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-search">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search...">
            </div>
            <div class="topbar-actions">
                <button class="btn-icon"><i class="fas fa-bell"></i></button>
                <button class="btn-icon" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                <div class="topbar-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6c5ce7&color=fff" alt="Profile">
                    <div>
                        <div class="username">Admin</div>
                        <div class="role">Administrator</div>
                    </div>
                </div>
            </div>
        </header>

        <section>
            <h1>Dashboard</h1>
            <p class="text-secondary">Welcome back! Here's what's happening with your platform.</p>

            <div class="stats-grid">
                <div class="glass-card">
                    <div class="card-title">Total Scripts</div>
                    <div class="card-value" id="totalScripts">0</div>
                </div>
                <div class="glass-card">
                    <div class="card-title">Total Loaders</div>
                    <div class="card-value" id="totalLoaders">0</div>
                </div>
                <div class="glass-card">
                    <div class="card-title">Active Users</div>
                    <div class="card-value" id="totalUsers">0</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        async function loadStats() {
            try {
                const token = localStorage.getItem('aurahub_token');
                const response = await fetch('/api/statistics', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('totalScripts').textContent = data.data.scripts || 0;
                    document.getElementById('totalLoaders').textContent = data.data.loaders || 0;
                    document.getElementById('totalUsers').textContent = data.data.users || 0;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        loadStats();
    </script>
</body>
</html>
