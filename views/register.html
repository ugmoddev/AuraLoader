<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AuraHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/public/css/style.css">
    <style>
        .register-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .register-box {
            max-width: 420px;
            width: 100%;
            padding: 40px;
        }
        .register-box h1 {
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
        }
        .register-box .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 14px;
        }
        .register-box .form-group {
            margin-bottom: 16px;
        }
        .register-box label {
            display: block;
            margin-bottom: 4px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }
        .register-box input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        .register-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }
        .register-box input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }
        .register-box .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 4px;
        }
        .register-box .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.4);
        }
        .register-box .btn-register:active {
            transform: translateY(0);
        }
        .register-box .login-link {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .register-box .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .register-box .login-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: var(--danger);
            text-align: center;
            margin-bottom: 16px;
            display: none;
            padding: 10px;
            background: rgba(225, 112, 85, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(225, 112, 85, 0.2);
        }
        .success-message {
            color: var(--secondary);
            text-align: center;
            margin-bottom: 16px;
            display: none;
            padding: 10px;
            background: rgba(0, 184, 148, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(0, 184, 148, 0.2);
        }
        .password-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            opacity: 0.7;
        }
        .register-box .icon-input {
            position: relative;
        }
        .register-box .icon-input i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            opacity: 0.5;
        }
        .register-box .icon-input input {
            padding-left: 40px;
        }
        @media (max-width: 480px) {
            .register-box {
                padding: 24px;
            }
            .register-box h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-box glass-card">
            <h1>AuraHub</h1>
            <p class="subtitle">Create your account to get started</p>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="registerForm" autocomplete="off">
                <div class="form-group">
                    <label>Username *</label>
                    <div class="icon-input">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Choose a username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email (optional)</label>
                    <div class="icon-input">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <div class="icon-input">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Choose a password" required>
                    </div>
                    <div class="password-hint">Minimum 6 characters</div>
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <div class="icon-input">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                    </div>
                </div>
                <button type="submit" class="btn-register">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            
            <div class="login-link">
                Already have an account? <a href="/login">Login here</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');
            
            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            
            // Validate
            if (!username) {
                errorEl.textContent = 'Username is required';
                errorEl.style.display = 'block';
                return;
            }
            
            if (username.length < 3) {
                errorEl.textContent = 'Username must be at least 3 characters';
                errorEl.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                errorEl.textContent = 'Passwords do not match';
                errorEl.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters';
                errorEl.style.display = 'block';
                return;
            }
            
            // Disable button
            const submitBtn = document.querySelector('.btn-register');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            
            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successEl.textContent = '✅ Registration successful! Redirecting to login...';
                    successEl.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    errorEl.textContent = data.error || 'Registration failed';
                    errorEl.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                }
            } catch (error) {
                console.error('Registration error:', error);
                errorEl.textContent = 'Network error. Please check your connection and try again.';
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        });
        
        // Real-time password validation
        document.getElementById('password').addEventListener('input', function() {
            const confirmInput = document.getElementById('confirmPassword');
            if (confirmInput.value && this.value !== confirmInput.value) {
                confirmInput.style.borderColor = 'var(--danger)';
            } else if (confirmInput.value) {
                confirmInput.style.borderColor = 'var(--secondary)';
            }
        });
        
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.value && this.value !== passwordInput.value) {
                this.style.borderColor = 'var(--danger)';
            } else if (passwordInput.value) {
                this.style.borderColor = 'var(--secondary)';
            }
        });
        
        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('registerForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
