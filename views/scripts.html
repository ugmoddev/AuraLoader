<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripts - AuraHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/public/css/style.css">
    <style>
        /* Additional styles for loader modal */
        .loader-code {
            background: var(--bg-primary);
            padding: 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
            margin: 12px 0;
        }
        .loader-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 12px 0;
        }
        .loader-info-item {
            background: var(--bg-primary);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-glass);
        }
        .loader-info-item label {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        .loader-info-item value {
            font-weight: 600;
            color: var(--text-primary);
        }
        .copy-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition);
        }
        .copy-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }
        .copy-btn.copied {
            background: var(--secondary);
        }
        .modal-body {
            padding: 24px;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h3>AuraHub</h3>
        </div>
        <ul class="sidebar-nav">
            <li><a href="/"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a href="/scripts" class="active"><i class="fas fa-code"></i> Scripts</a></li>
            <li><a href="/loaders"><i class="fas fa-link"></i> Loaders</a></li>
            <li><a href="/users"><i class="fas fa-users"></i> Users</a></li>
            <li><a href="/logs"><i class="fas fa-history"></i> Logs</a></li>
            <li><a href="/admin"><i class="fas fa-cog"></i> Admin</a></li>
            <li><a href="/settings"><i class="fas fa-sliders-h"></i> Settings</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-search">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search scripts..." id="scriptSearch">
            </div>
            <div class="topbar-actions">
                <button class="btn-icon"><i class="fas fa-bell"></i></button>
                <button class="btn-icon sidebar-toggle"><i class="fas fa-bars"></i></button>
                <div class="topbar-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=6c5ce7&color=fff" alt="Profile">
                    <div>
                        <div class="username">Admin</div>
                        <div class="role">Administrator</div>
                    </div>
                </div>
            </div>
        </header>

        <section>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div>
                    <h1>Scripts</h1>
                    <p class="text-secondary">Manage your Lua scripts</p>
                </div>
                <button class="btn-primary-glass" onclick="openCreateScript()">
                    <i class="fas fa-plus"></i> New Script
                </button>
            </div>

            <div class="glass-card">
                <div class="table-container">
                    <table class="table-glass">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Author</th>
                                <th>Version</th>
                                <th>Category</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="scriptsList">
                            <tr>
                                <td colspan="7" style="text-align: center; padding: 40px;">
                                    <div class="loading-spinner"></div>
                                    <p style="margin-top: 12px; color: var(--text-secondary);">Loading scripts...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div style="margin-top: 16px; display: flex; justify-content: space-between; align-items: center;">
                    <span id="scriptsCount" class="text-secondary">Loading...</span>
                    <div class="pagination-glass" id="pagination"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Create Script Modal -->
    <div id="createScriptModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center;">
        <div class="modal-glass" style="max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border-glass);">
                <h3>Create New Script</h3>
                <button onclick="closeCreateScript()" style="background: none; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer;">&times;</button>
            </div>
            <div style="padding: 24px;">
                <form id="createScriptForm">
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 4px; color: var(--text-secondary);">Script Name *</label>
                        <input type="text" name="name" required style="width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border-glass); border-radius: 8px; color: var(--text-primary);">
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 4px; color: var(--text-secondary);">Author</label>
                        <input type="text" name="author" style="width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border-glass); border-radius: 8px; color: var(--text-primary);">
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 4px; color: var(--text-secondary);">Description</label>
                        <textarea name="description" rows="3" style="width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border-glass); border-radius: 8px; color: var(--text-primary);"></textarea>
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 4px; color: var(--text-secondary);">Version</label>
                        <input type="text" name="version" value="1.0.0" style="width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border-glass); border-radius: 8px; color: var(--text-primary);">
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 4px; color: var(--text-secondary);">Category</label>
                        <select name="category" style="width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border-glass); border-radius: 8px; color: var(--text-primary);">
                            <option value="general">General</option>
                            <option value="utility">Utility</option>
                            <option value="game">Game</option>
                            <option value="security">Security</option>
                            <option value="ai">AI</option>
                        </select>
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 4px; color: var(--text-secondary);">Source Code *</label>
                        <textarea name="source" rows="10" required style="width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border-glass); border-radius: 8px; color: var(--text-primary); font-family: monospace;"></textarea>
                    </div>
                    <div style="display: flex; gap: 12px; justify-content: flex-end;">
                        <button type="button" class="btn-glass" onclick="closeCreateScript()">Cancel</button>
                        <button type="submit" class="btn-primary-glass">Create Script</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Loader Result Modal -->
    <div id="loaderModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center;">
        <div class="modal-glass" style="max-width: 700px; width: 90%; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border-glass);">
                <h3><i class="fas fa-link" style="color: var(--primary);"></i> Loader Generated</h3>
                <button onclick="closeLoaderModal()" style="background: none; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer;">&times;</button>
            </div>
            <div class="modal-body">
                <div class="loader-info">
                    <div class="loader-info-item">
                        <label>Loader ID</label>
                        <value id="loaderIdDisplay">-</value>
                    </div>
                    <div class="loader-info-item">
                        <label>Secret</label>
                        <value id="secretDisplay">-</value>
                    </div>
                    <div class="loader-info-item">
                        <label>Version</label>
                        <value id="versionDisplay">-</value>
                    </div>
                    <div class="loader-info-item">
                        <label>Script</label>
                        <value id="scriptNameDisplay">-</value>
                    </div>
                </div>
                <div style="margin-top: 12px;">
                    <label style="display: block; margin-bottom: 4px; color: var(--text-secondary);">Loader Code (Copy and paste into your Lua script)</label>
                    <div class="loader-code" id="loaderCodeDisplay">Loading...</div>
                    <button class="copy-btn" onclick="copyLoaderCode()" id="copyBtn">
                        <i class="fas fa-copy"></i> Copy Code
                    </button>
                </div>
                <div style="margin-top: 16px; display: flex; gap: 12px; justify-content: flex-end;">
                    <button class="btn-glass" onclick="closeLoaderModal()">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // SCRIPT MANAGEMENT - NO AUTH REQUIRED
        // =============================================
        
        let currentPage = 1;
        const limit = 10;
        let currentLoaderData = null;

        // Load scripts
        async function loadScripts(page = 1, search = '') {
            const url = `/api/scripts?page=${page}&limit=${limit}${search ? `&search=${search}` : ''}`;
            
            try {
                console.log('📥 Fetching scripts from:', url);
                
                const response = await fetch(url);
                console.log('📥 Response status:', response.status);
                
                const data = await response.json();
                console.log('📥 Response data:', data);
                
                if (data.success) {
                    renderScripts(data.data);
                    updatePagination(data.pagination);
                    document.getElementById('scriptsCount').textContent = `Showing ${data.data.length} of ${data.pagination?.total || 0} scripts`;
                } else {
                    document.getElementById('scriptsList').innerHTML = `
                        <tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--text-secondary);">
                            <i class="fas fa-exclamation-circle" style="font-size: 24px; margin-bottom: 8px;"></i>
                            <p>${data.error || 'Failed to load scripts'}</p>
                        </td></tr>
                    `;
                }
            } catch (error) {
                console.error('❌ Failed to load scripts:', error);
                document.getElementById('scriptsList').innerHTML = `
                    <tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--text-secondary);">
                        <i class="fas fa-exclamation-circle" style="font-size: 24px; margin-bottom: 8px;"></i>
                        <p>Error loading scripts: ${error.message}</p>
                    </td></tr>
                `;
            }
        }

        // Render scripts table
        function renderScripts(scripts) {
            const tbody = document.getElementById('scriptsList');
            tbody.innerHTML = '';
            
            if (!scripts || scripts.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--text-secondary);">
                        <i class="fas fa-code" style="font-size: 32px; margin-bottom: 12px; display: block;"></i>
                        <p>No scripts found. Create your first script!</p>
                    </td></tr>
                `;
                return;
            }
            
            scripts.forEach(script => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${script.name}</strong></td>
                    <td>${script.author || 'Unknown'}</td>
                    <td>v${script.version}</td>
                    <td>${script.category || 'general'}</td>
                    <td><span class="badge-status ${script.enabled ? 'active' : 'inactive'}">${script.enabled ? 'Active' : 'Inactive'}</span></td>
                    <td>${new Date(script.createdAt).toLocaleDateString()}</td>
                    <td>
                        <button class="btn-glass" style="padding: 4px 8px;" onclick="editScript('${script.uuid}')" title="Edit"><i class="fas fa-edit"></i></button>
                        <button class="btn-glass" style="padding: 4px 8px; color: var(--danger);" onclick="deleteScript('${script.uuid}')" title="Delete"><i class="fas fa-trash"></i></button>
                        <button class="btn-glass" style="padding: 4px 8px; color: var(--primary);" onclick="generateLoader('${script.uuid}')" title="Generate Loader"><i class="fas fa-link"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Pagination
        function updatePagination(pagination) {
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            
            if (!pagination || pagination.pages <= 1) return;
            
            for (let i = 1; i <= pagination.pages; i++) {
                const button = document.createElement('button');
                button.textContent = i;
                button.className = i === pagination.page ? 'active' : '';
                button.onclick = () => {
                    currentPage = i;
                    loadScripts(i, document.getElementById('scriptSearch').value);
                };
                container.appendChild(button);
            }
        }

        // Create Script Modal
        function openCreateScript() {
            document.getElementById('createScriptModal').style.display = 'flex';
        }

        function closeCreateScript() {
            document.getElementById('createScriptModal').style.display = 'none';
        }

        document.getElementById('createScriptForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('/api/scripts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                if (result.success) {
                    closeCreateScript();
                    loadScripts(currentPage);
                    alert('Script created successfully!');
                } else {
                    alert(result.error || 'Failed to create script');
                }
            } catch (error) {
                alert('Error creating script: ' + error.message);
            }
        });

        // Search
        document.getElementById('scriptSearch').addEventListener('input', (e) => {
            clearTimeout(this.searchTimeout);
            this.searchTimeout = setTimeout(() => {
                loadScripts(1, e.target.value);
            }, 300);
        });

        // Delete Script
        async function deleteScript(uuid) {
            if (!confirm('Are you sure you want to delete this script?')) return;
            
            try {
                const response = await fetch(`/api/scripts/${uuid}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                if (result.success) {
                    loadScripts(currentPage);
                    alert('Script deleted successfully!');
                } else {
                    alert(result.error || 'Failed to delete script');
                }
            } catch (error) {
                alert('Error deleting script: ' + error.message);
            }
        }

        // =============================================
        // GENERATE LOADER - NO AUTH REQUIRED
        // =============================================

        async function generateLoader(uuid) {
            console.log('🔧 Generating loader for script:', uuid);
            
            // Show loading state
            const loaderModal = document.getElementById('loaderModal');
            const loaderCodeDisplay = document.getElementById('loaderCodeDisplay');
            loaderCodeDisplay.textContent = '⏳ Generating loader...';
            loaderModal.style.display = 'flex';
            
            try {
                const response = await fetch('/loader/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ scriptId: uuid })
                });
                
                const result = await response.json();
                console.log('📥 Loader response:', result);
                
                if (result.success) {
                    currentLoaderData = result.data;
                    
                    // Display loader info
                    document.getElementById('loaderIdDisplay').textContent = result.data.loaderId;
                    document.getElementById('secretDisplay').textContent = result.data.secret;
                    document.getElementById('versionDisplay').textContent = result.data.version;
                    document.getElementById('scriptNameDisplay').textContent = result.data.scriptName || 'Unknown';
                    document.getElementById('loaderCodeDisplay').textContent = result.data.loaderCode;
                    
                    // Reset copy button
                    const copyBtn = document.getElementById('copyBtn');
                    copyBtn.textContent = '<i class="fas fa-copy"></i> Copy Code';
                    copyBtn.className = 'copy-btn';
                } else {
                    loaderCodeDisplay.textContent = '❌ Error: ' + (result.error || 'Failed to generate loader');
                }
            } catch (error) {
                console.error('❌ Error generating loader:', error);
                loaderCodeDisplay.textContent = '❌ Error: ' + error.message;
            }
        }

        // Copy loader code
        function copyLoaderCode() {
            const code = document.getElementById('loaderCodeDisplay').textContent;
            const copyBtn = document.getElementById('copyBtn');
            
            if (!code || code.startsWith('❌') || code.startsWith('⏳')) {
                alert('No valid loader code to copy');
                return;
            }
            
            navigator.clipboard.writeText(code).then(() => {
                copyBtn.textContent = '<i class="fas fa-check"></i> Copied!';
                copyBtn.className = 'copy-btn copied';
                setTimeout(() => {
                    copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy Code';
                    copyBtn.className = 'copy-btn';
                }, 3000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = code;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('Code copied to clipboard!');
            });
        }

        // Close loader modal
        function closeLoaderModal() {
            document.getElementById('loaderModal').style.display = 'none';
        }

        // Edit script (placeholder)
        function editScript(uuid) {
            alert('Edit functionality coming soon!\nScript UUID: ' + uuid);
        }

        // Close modals on outside click
        document.getElementById('createScriptModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeCreateScript();
            }
        });
        
        document.getElementById('loaderModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeLoaderModal();
            }
        });

        // =============================================
        // INIT - Load scripts on page load
        // =============================================

        loadScripts();

        console.log('📄 Scripts page loaded successfully');
    </script>
</body>
</html>
